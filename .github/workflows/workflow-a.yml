# .github/workflows/workflow-a.yml
name: Workflow A - TEST

on:
  workflow_call:
    inputs:
      workspace_name:
        required: true
        type: string
      workspace_id:
        required: true
        type: string
      repo_url:
        required: true
        type: string
      deploy_workspace_id:
        required: true
        type: string
    secrets:
      FABRIC_TENANT_ID:
        required: true
      FABRIC_CLIENT_ID:
        required: true
      FABRIC_CLIENT_SECRET:
        required: true
      ADO_PAT:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug inputs
        run: |
          echo "workspace_name=${{ inputs.workspace_name }}"
          echo "workspace_id=${{ inputs.workspace_id }}"
          echo "repo_url=${{ inputs.repo_url }}"
          echo "capacity_id=${{ inputs.capacity_id }}"

      - name: Run existing deployment logic
        run: |
          echo "TEST: Deploying to workspace ID ${{ inputs.workspace_id }}"