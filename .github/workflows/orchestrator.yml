# .github/workflows/orchestrator.yml
# Fabric Disaster Recovery Orchestrator workflow
name: Fabric DR Orchestrator

on:
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      # Reads the workspaces.json file, validates it, and sets the matrix for the next job
      # Change to parameters if needed - to be validated
      - name: Read JSON and build matrix
        id: set_matrix
        shell: bash
        run: |
          python - << 'PY'
          import json
          import os
          from pathlib import Path

          file_path = Path(".github/fabric-dr/workspaces.json")
          if not file_path.exists():
              raise SystemExit(f"File not found: {file_path}")

          data = json.loads(file_path.read_text(encoding="utf-8"))

          if not isinstance(data, list):
              raise SystemExit("workspaces.json must contain a JSON array")

          if len(data) == 0:
              raise SystemExit("workspaces.json is empty")

          for i, item in enumerate(data):
              if "ado_repo_url" not in item:
                  raise SystemExit(f"Entry #{i} is missing ado_repo_url")
              if "workspace_name" not in item:
                  raise SystemExit(f"Entry #{i} is missing workspace_name")

          matrix = {"include": data}

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write("matrix=" + json.dumps(matrix) + "\n")

          print(json.dumps(matrix, indent=2))
          PY

  recover-each:
    needs: build-matrix
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    uses: ./.github/workflows/recover-one-workspace.yml@main
    with:
      workspace_name: ${{ matrix.workspace_name }}
      ado_repo_url: ${{ matrix.ado_repo_url }}
      log_level: info
      force_delete: false
    secrets: inherit