# .github/workflows/dr-orchestrator.yml
name: Fabric DR Orchestrator

on:
  workflow_dispatch:
    inputs:
      repos_json:
        description: 'JSON array of repos to recover. Example: ["org/repo1","org/repo2"]'
        required: true
        type: string
      workspace_prefix:
        description: 'Prefix for newly created workspaces'
        required: true
        type: string

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          # Transform input list into a matrix object GitHub understands:
          # { "include": [ {"repo":"org/repo1"}, {"repo":"org/repo2"} ] }
          python - << 'PY'
          import json, os
          repos = json.loads(os.environ["REPOS"])
          matrix = {"include": [{"repo": r} for r in repos]}
          print(f"matrix={json.dumps(matrix)}")
          PY
        env:
          REPOS: ${{ inputs.repos_json }}
        shell: bash
      - name: Export output
        id: set2
        run: |
          python - << 'PY'
          import json, os
          repos = json.loads(os.environ["REPOS"])
          matrix = {"include": [{"repo": r} for r in repos]}
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write("matrix=" + json.dumps(matrix) + "\n")
          PY
        env:
          REPOS: ${{ inputs.repos_json }}

  recover-each:
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:
      - name: Create new Fabric workspace
        id: create_ws
        run: |
          echo "Creating workspace for repo: ${{ matrix.repo }}"

          # 1) Acquire token (example using client credentials)
          # 2) POST to Fabric to create workspace
          # 3) Extract workspace id and set it as output
          #
          # Replace these with your real Fabric API calls.

          NEW_WS_ID="00000000-0000-0000-0000-000000000000"
          echo "workspace_id=$NEW_WS_ID" >> "$GITHUB_OUTPUT"

      - name: Call reusable deploy workflow (Workflow A)
        uses: ./.github/workflows/deploy-fabric-workspace.yml
        with:
          repo_url: ${{ matrix.repo }}
          workspace_id: ${{ steps.create_ws.outputs.workspace_id }}
