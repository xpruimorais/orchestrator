name: Fabric DR Orchestrator

on:
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Read JSON, validate, sort by order, and build matrix
        id: set_matrix
        shell: bash
        run: |
          python - << 'PY'
          import json
          import os
          from pathlib import Path

          file_path = Path(".github/fabric-dr/workspaces.json")
          if not file_path.exists():
              raise SystemExit(f"File not found: {file_path}")

          data = json.loads(file_path.read_text(encoding="utf-8"))

          if not isinstance(data, list) or not data:
              raise SystemExit("workspaces.json must contain a non-empty JSON array")

          required_fields = ["ado_repo_url", "workspace_name", "capacity_id", "order"]
          seen_orders = set()

          for i, item in enumerate(data):
              for field in required_fields:
                  if field not in item:
                      raise SystemExit(f"Entry #{i} is missing required field: {field}")

              if not isinstance(item["order"], int):
                  raise SystemExit(f"Entry #{i} field 'order' must be an integer")

              if item["order"] in seen_orders:
                  raise SystemExit(f"Duplicate order value found: {item['order']}")

              seen_orders.add(item["order"])

          ordered = sorted(data, key=lambda x: x["order"])
          matrix = {"include": ordered}

          print("Ordered matrix:")
          print(json.dumps(matrix, indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write("matrix=" + json.dumps(matrix) + "\n")
          PY

  recover-each:
    needs: build-matrix
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    uses: ./.github/workflows/workflow-a.yml
    with:
      workspace_name: ${{ matrix.workspace_name }}
      workspace_id: ${{ matrix.workspace_id }}
      repo_url: ${{ matrix.repo_url }}
      capacity_id: ${{ matrix.capacity_id }}
    secrets: inherit