name: Test Fabric DR Orchestrator

on:
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Read JSON and build matrix
        id: set_matrix
        shell: bash
        run: |
          python - << 'PY'
          import json
          import os
          from pathlib import Path

          file_path = Path(".github/fabricdr/workspaces.json")
          if not file_path.exists():
              raise SystemExit(f"File not found: {file_path}")

          data = json.loads(file_path.read_text(encoding="utf-8"))

          if not isinstance(data, list):
              raise SystemExit("workspaces.json must contain a JSON array")

          if len(data) == 0:
              raise SystemExit("workspaces.json is empty")

          matrix = {"include": data}

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write("matrix=" + json.dumps(matrix) + "\n")

          print("Generated matrix:")
          print(json.dumps(matrix, indent=2))
          PY

  hello-each-workspace:
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:
      - name: Hello world for each workspace
        run: |
          echo "Hello from matrix job"
          echo "Repo: ${{ matrix.repo }}"
          echo "Workspace name: ${{ matrix.workspace_name }}"
